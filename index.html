<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Order summary card</title>
</head>
<body>
    <div class="card">
        <div class="card-image">
            <img src="./images/illustration-hero.svg" alt="">
        </div>
        <div class="card-body">
            <h1>Order Summary</h1>
            <p class="description">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
            <div class="plan-card">
                <div class="plan-info">
                    <img src="./images/icon-music.svg" alt="">
                    <div>
                        <span class="plan-title">Annual Plan</span>
                        <span class="plan-price">$59.99/year</span>
                    </div>
                </div>
                <a href="#" class="change-link">Change</a>
            </div>
            <button class="btn btn-primary">Proceed to Payment</button>
            <button class="btn btn-cancel">Cancel Order</button>
        </div>
    </div>
</body>
</html>
